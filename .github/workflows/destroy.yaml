name: "destroy"
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm that you want to destroy the infrastructure'
        required: true
jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Guard agains accidental runs
        run: |
          if [ "${{ github.event.input.confirm }}" != "destroy" ]: than
            echo "Confirmation text did not match. Aborting"
            exit 1
          fi
      - name: checkout
        uses: actions/checkout@v4

      - name: setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: terraform init
        working-directory: ./terraform
        run: terraform init
        env:
          TF_VAR_project: "gd-gcp-internship-devops"
          TF_VAR_region: "us-central1"
          TF_VAR_nexus_user: ${{ secrets.NEXUS_USER }}
          TF_VAR_nexus_pass: ${{ secrets.NEXUS_PASS }}
          TF_VAR_jwt_access_secret: ${{ secrets.JWT_ACCESS_SECRET }}
          TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
          TF_VAR_salt: ${{ secrets.SALT }}
          TF_VAR_jwt_access_expires_in: "1h"
          TF_VAR_jwt_refresh_expires_in: "14d"

      - name: terraform destroy
        working-directory: ./terraform
        run: terraform destroy -auto-approve
        env:
          TF_VAR_project: "gd-gcp-internship-devops"
          TF_VAR_region: "us-central1"
          TF_VAR_nexus_user: ${{ secrets.NEXUS_USER }}
          TF_VAR_nexus_pass: ${{ secrets.NEXUS_PASS }}
          TF_VAR_jwt_access_secret: ${{ secrets.JWT_ACCESS_SECRET }}
          TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
          TF_VAR_salt: ${{ secrets.SALT }}
          TF_VAR_jwt_access_expires_in: "1h"
          TF_VAR_jwt_refresh_expires_in: "14d"
