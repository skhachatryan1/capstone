apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: {{ .Release.Name }}-ingress
    annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
    rules:
        - http:
            paths:
                - path: /v2
                  pathType: Prefix
                  backend:
                    service:
                        name: nexus-local-proxy
                        port:
                            number: 8082 
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                        name: {{ .Release.Name }}-backend-svc
                        port: 
                            number: 80
                - path: /
                  pathType: Prefix
                  backend: 
                    service: 
                        name: {{ .Release.Name }}-frontend-svc
                        port: 
                            number: 80



                