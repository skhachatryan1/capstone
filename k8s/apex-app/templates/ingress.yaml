apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: {{ .Release.Name }}-ingress
    annotations:
        kubernetes.io/ingress.class: nginx
spec:
    rules:
        - http:
            paths:
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                        name: {{ .Release.Name }}-backend-svc
                        port: 
                            number: 80
                - path: /
                  pathType: Prefix
                  backend: 
                    service: 
                        name: {{ .Release.Name }}-frontend-svc
                        port: 
                            number: 80



                